name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - .github/workflows/npm-publish.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect publishable version
        id: version
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          current_version=$(node -p "require('./package.json').version")
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"

          published_version=""
          if npm view "$package_name" version --registry=https://registry.npmjs.org >/tmp/npm-version.txt 2>/tmp/npm-version.err; then
            published_version=$(tr -d '\n' </tmp/npm-version.txt)
          else
            if grep -qi "E404" /tmp/npm-version.err; then
              echo "Package $package_name has not been published yet."
            else
              echo "Failed to query npm for $package_name version."
              cat /tmp/npm-version.err
              exit 1
            fi
          fi

          echo "published_version=$published_version" >> "$GITHUB_OUTPUT"

          if [ -n "$published_version" ] && [ "$current_version" = "$published_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping publish because npm already has version $current_version."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          if [ -n "$published_version" ]; then
            echo "package.json version differs from npm: $published_version -> $current_version"
          else
            echo "package.json version $current_version will be published as the first npm release."
          fi

      - name: Stop when npm already has this version
        if: steps.version.outputs.changed != 'true'
        run: echo "Skipping publish because npm already has version ${{ steps.version.outputs.current_version }}."

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        if: steps.version.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: bun run test:ci

      - name: Build package
        if: steps.version.outputs.changed == 'true'
        run: bun run build

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public
